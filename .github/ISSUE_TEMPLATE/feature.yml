name: "✨ Feature"
description: "새로운 기능 추가 요청"
labels: [ "enhancement" ]
body:
  - type: textarea
    attributes:
      label: 📄 기능 개요
      description: 구현하려는 기능의 목적과 배경을 작성해 주세요.
      placeholder: >
        지도 기반 사진 플랫폼에 '사진 클러스터링' 기능을 추가하여,
        확대/축소 시 시각적 복잡도를 줄이고 탐색성을 개선합니다.
    validations:
      required: true

  - type: textarea
    attributes:
      label: ✅ 작업 내용
      description: 구현해야 할 작업을 체크박스 형태로 직접 작성해 주세요.
      placeholder: |
        [ ] API 설계 (/photos/clustered)
        [ ] 클러스터링 알고리즘 적용(K-means / DBSCAN / GeoHash)
        [ ] 확대/축소 이벤트에 따른 클러스터 재계산
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🙋🏻 참고 자료
      description: 관련 문서나 참고 링크를 적어주세요.
      placeholder: |
        - https://developers.google.com/maps/documentation/javascript/marker-clustering
        - Figma 디자인 시안 링크
        - 기존 API 명세서
